# cubeplane server configuration.
# All keys are optional; omitted values fall back to the defaults shown here.

[server]
host = "0.0.0.0"
port = 25565
max_players = 20
motd = "A cubeplane server — Rust engine, JS mods"
# Square radius (in chunks) streamed around each player.
view_distance = 8
# Packet compression threshold in bytes; set to -1 to disable.
compression_threshold = 256
# One of: survival, creative, adventure, spectator.
gamemode = "creative"
# Operator names allowed to run cheat commands. Empty = everyone is an op.
ops = []
# Enable protocol encryption + Mojang auth (needs outbound network; falls back
# to the client-supplied name if the session server is unreachable).
online_mode = false
# Optional resource pack URL offered to clients on join.
resource_pack = ""

[world]
# One of: terrain (value-noise hills) or flat (superflat).
generator = "terrain"
seed = 24317
# Persist block edits and player data to disk.
save = true
save_dir = "world_data"
# Persistence format: "delta" (edits over the generator) or "region"
# (full chunk columns, Anvil-style).
format = "delta"
# Keep a player's items when they die.
keep_inventory = false
# Spawn hostile mobs at night (otherwise only passive animals appear).
spawn_hostiles = true
# World border diameter in blocks (default effectively unlimited).
border_diameter = 60000000.0

[mods]
enabled = true
# Directory scanned for *.js mods at startup.
dir = "mods"

[control]
# HTTP + WebSocket admin/control API consumed by the Atlas panel.
enabled = true
host = "127.0.0.1"
port = 8080
# Uncomment to require `Authorization: Bearer <token>` on the control API.
# token = "change-me"

[ai]
# Experimental: give villagers real, in-character AI. Right-click a villager
# in-game to chat; it replies according to its profession. Configure here or
# live from the Atlas admin panel (no restart needed). Default: off.
enabled = false
provider = "ollama"   # ollama | openai | claude
model = "llama3.2"
# api_key = ""        # required for openai / claude
# base_url = ""       # override endpoint; empty = provider default
max_tokens = 200
history_limit = 6
temperature = 0.8
